<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1520"/>
      <stop offset="100%" style="stop-color:#060d16"/>
    </linearGradient>

    <linearGradient id="waveFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#38bdf8;stop-opacity:0.8"/>
      <stop offset="30%"  style="stop-color:#a0e4f8"/>
      <stop offset="60%"  style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0.7"/>
    </linearGradient>

    <linearGradient id="fillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#38bdf8;stop-opacity:0.75"/>
      <stop offset="50%"  style="stop-color:#0ea5e9;stop-opacity:0.28"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.04"/>
    </linearGradient>

    <linearGradient id="windowFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd4f0;stop-opacity:0.28"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.06"/>
    </linearGradient>

    <filter id="dotGlow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="waveGlow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="windowGlow">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="windowClip">
      <rect x="80" y="14" width="52" height="172"/>
    </clipPath>
  </defs>

  <rect width="200" height="200" rx="44" fill="url(#bg)"/>

  <!-- Tide fill -->
  <path d="M14,148 C28,148 36,92 54,84 C68,78 74,110 90,94 C102,82 112,62 132,58 C152,54 160,80 186,84 L186,172 L14,172 Z"
        fill="url(#fillGrad)" clip-path="url(#innerClip)"/>

  <!-- Window band -->
  <rect x="80" y="14" width="52" height="158" fill="url(#windowFill)" clip-path="url(#innerClip)" filter="url(#windowGlow)"/>
  <line x1="80"  y1="14" x2="80"  y2="172" stroke="#38bdf8" stroke-width="1.6" stroke-opacity="0.75" stroke-dasharray="5,4" clip-path="url(#innerClip)"/>
  <line x1="132" y1="14" x2="132" y2="172" stroke="#38bdf8" stroke-width="1.6" stroke-opacity="0.75" stroke-dasharray="5,4" clip-path="url(#innerClip)"/>

  <!-- Full tide curve -->
  <path d="M14,148 C28,148 36,92 54,84 C68,78 74,110 90,94 C102,82 112,62 132,58 C152,54 160,80 186,84"
        fill="none" stroke="#5aaec8" stroke-width="1.5" stroke-linecap="round" clip-path="url(#innerClip)"/>

  <!-- Window segment — same curve, clipped to window band -->
  <path d="M14,148 C28,148 36,92 54,84 C68,78 74,110 90,94 C102,82 112,62 132,58 C152,54 160,80 186,84"
        fill="none" stroke="url(#waveFlow)" stroke-width="3" stroke-linecap="round"
        filter="url(#waveGlow)" clip-path="url(#windowClip)"/>
  <!-- Bright spine -->
  <path d="M14,148 C28,148 36,92 54,84 C68,78 74,110 90,94 C102,82 112,62 132,58 C152,54 160,80 186,84"
        fill="none" stroke="#e8f9ff" stroke-width="1" stroke-linecap="round"
        stroke-opacity="0.65" clip-path="url(#windowClip)"/>

  <!-- Peak dot -->
  <circle cx="106" cy="72" r="13" fill="#06b6d4" fill-opacity="0.2" filter="url(#dotGlow)"/>
  <circle cx="106" cy="72" r="7"  fill="#22d3ee" filter="url(#dotGlow)"/>
  <circle cx="106" cy="72" r="3"  fill="#f0fbff"/>

  <!-- Ticks -->
  <line x1="38"  y1="165" x2="38"  y2="176" stroke="#5aaec8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="80"  y1="162" x2="80"  y2="178" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="106" y1="159" x2="106" y2="182" stroke="#22d3ee" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="132" y1="162" x2="132" y2="178" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="164" y1="165" x2="164" y2="176" stroke="#5aaec8" stroke-width="2.5" stroke-linecap="round"/>

</svg>