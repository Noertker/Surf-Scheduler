<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1520"/>
      <stop offset="100%" style="stop-color:#060d16"/>
    </linearGradient>

    <linearGradient id="waveFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#0369a1;stop-opacity:0.5"/>
      <stop offset="30%"  style="stop-color:#0ea5e9"/>
      <stop offset="60%"  style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:0.4"/>
    </linearGradient>

    <linearGradient id="fillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0"/>
    </linearGradient>

    <linearGradient id="windowFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.03"/>
    </linearGradient>

    <linearGradient id="dimCurve" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#1e4a6a;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1e4a6a;stop-opacity:0.6"/>
    </linearGradient>

    <filter id="dotGlow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="waveGlow">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="windowGlow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="innerClip">
      <rect x="14" y="14" width="172" height="172" rx="30"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>

  <!-- ── TIDE FILL AREA ── -->
  <path d="M14,148 C28,148 36,92 54,84 C68,78 74,110 90,94 C102,82 112,62 132,58 C152,54 160,80 186,84 L186,172 L14,172 Z"
        fill="url(#fillGrad)" clip-path="url(#innerClip)"/>

  <!-- ── WINDOW BAND — glowing fill ── -->
  <rect x="80" y="14" width="52" height="158" fill="url(#windowFill)" clip-path="url(#innerClip)" filter="url(#windowGlow)"/>

  <!-- Window dashed edges — brighter -->
  <line x1="80"  y1="14" x2="80"  y2="172" stroke="#0ea5e9" stroke-width="1.2" stroke-opacity="0.5" stroke-dasharray="5,4" clip-path="url(#innerClip)"/>
  <line x1="132" y1="14" x2="132" y2="172" stroke="#0ea5e9" stroke-width="1.2" stroke-opacity="0.5" stroke-dasharray="5,4" clip-path="url(#innerClip)"/>

  <!-- ── FULL TIDE CURVE — dimmed but visible ── -->
  <path d="M14,148 C28,148 36,92 54,84 C68,78 74,110 90,94 C102,82 112,62 132,58 C152,54 160,80 186,84"
        fill="none" stroke="#2a5a7a" stroke-width="2" stroke-linecap="round" clip-path="url(#innerClip)"/>

  <!-- ── BRIGHT WINDOW SEGMENT — thicker, glowing ── -->
  <path d="M80,100 C88,94 94,82 100,76 C110,64 120,60 132,57"
        fill="none" stroke="url(#waveFlow)" stroke-width="4" stroke-linecap="round"
        filter="url(#waveGlow)" clip-path="url(#innerClip)"/>

  <!-- ── PEAK DOT — bigger, brighter ── -->
  <circle cx="106" cy="72" r="8" fill="#06b6d4" fill-opacity="0.3" filter="url(#dotGlow)"/>
  <circle cx="106" cy="72" r="5.5" fill="#06b6d4" filter="url(#dotGlow)"/>
  <circle cx="106" cy="72" r="2.5" fill="#e8faff"/>

  <!-- ── TICK MARKS — more presence ── -->
  <line x1="38"  y1="166" x2="38"  y2="175" stroke="#2a5a7a" stroke-width="2"   stroke-linecap="round"/>
  <line x1="80"  y1="164" x2="80"  y2="176" stroke="#0ea5e9" stroke-width="2"   stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="106" y1="162" x2="106" y2="180" stroke="#06b6d4" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="132" y1="164" x2="132" y2="176" stroke="#0ea5e9" stroke-width="2"   stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="164" y1="166" x2="164" y2="175" stroke="#2a5a7a" stroke-width="2"   stroke-linecap="round"/>

</svg>